name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # 关键步骤：在 Actions 虚拟机上全自动寻找、安装并配置好 Android SDK 环境，配置 ANDROID_HOME 变量
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # 编译 Debug 版 APK (已签名，可直接安装测试) 和 Release 版 APK
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: CC-ImageCompressor-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: CC-ImageCompressor-Release-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Prepare Release Files
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        mkdir -p release_files
        cp app/build/outputs/apk/debug/app-debug.apk release_files/ChaoTuCompressor-v${{ github.ref_name }}-debug.apk
        cp app/build/outputs/apk/release/app-release-unsigned.apk release_files/ChaoTuCompressor-v${{ github.ref_name }}-release-unsigned.apk

    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release_files/*.apk
        name: "超图压缩 V${{ github.ref_name }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
